name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm release

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/module.json
            dist/module.zip
            dist/LICENSE
            dist/README.md
            dist/THIRD_PARTY_ASSETS.md

      - name: Publish to Foundry VTT
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="https://github.com/${{ github.repository }}"
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: ${{ secrets.FOUNDRY_PACKAGE_RELEASE_TOKEN }}" \
            -d "{
              \"id\": \"tension-pool-2\",
              \"release\": {
                \"version\": \"${VERSION}\",
                \"manifest\": \"${REPO}/releases/latest/download/module.json\",
                \"notes\": \"${REPO}/releases/tag/${GITHUB_REF_NAME}\",
                \"compatibility\": {
                  \"minimum\": \"13\",
                  \"verified\": \"13\"
                }
              }
            }" \
            https://foundryvtt.com/_api/packages/release_version/ | jq .
